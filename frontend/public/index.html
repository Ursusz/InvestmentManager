<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Investment Manager</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="kicker">Savings Account</p>
          <h1>Investment Manager</h1>
        </div>
        <div>
          <button id="resetAccount" class = "reset-button" type="button">Reset Account</button>
          <button id="backfillMonths" class="statement-button" type="button">Backfill Months</button>
        </div>
      </header>

      <section class="metrics" aria-label="Account totals">
        <article>
          <span>Deposits</span>
          <strong id="depositTotal">0.00</strong>
        </article>
        <article>
          <span>Withdrawals</span>
          <strong id="withdrawalTotal">0.00</strong>
        </article>
        <article>
          <span>Interest</span>
          <strong id="interestTotal">0.00</strong>
        </article>
        <article>
          <span>Tax</span>
          <strong id="taxTotal">0.00</strong>
        </article>
        <article>
          <span>AccountBalance</span>
          <strong id="balance">0.00</strong>
        </article>
      </section>

      <section class="layout">
        <aside class="panel">
          <div class="panel-title">
            <h2>Add Transaction</h2>
            <div class="tabs" aria-label="Transaction type">
              <button id="depositTab" class="tab active" type="button">Deposit</button>
              <button id="withdrawTab" class="tab" type="button">Withdraw</button>
            </div>
          </div>

          <form id="transactionForm" class="form">
            <label>
              Amount
              <input id="amount" type="number" min="0.01" step="0.01" required>
            </label>

            <label>
              Details
              <input id="description" type="text" maxlength="80" required>
            </label>

            <label id="dateField">
              Date
              <input id="transactionDate" type="date" required>
            </label>

            <button id="submitButton" class="primary-button" type="submit">Add Deposit</button>
            <p id="message" class="message" role="status"></p>
          </form>
        </aside>

        <section class="panel statement">
          <div class="panel-title">
            <h2>Account Statement</h2>
            <div>
              <a class="balance-button nav-button" href="/chart.html">Balance Chart</a>
              <span id="transactionCount" class="count">0 transactions</span>
            </div>
          </div>

          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Details</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="statementBody">
                <tr>
                  <td class="empty" colspan="5">No transactions loaded.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
